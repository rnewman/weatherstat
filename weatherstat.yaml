# Weatherstat configuration — single source of truth for all entity IDs,
# column names, effector definitions, and operational parameters.
#
# Read by both TypeScript (ha-client) and Python (ml) code.
# Adding a sensor: add an entry here, restart collector.

location:
  latitude: 47.66
  longitude: -122.40
  elevation: 30
  timezone: America/Los_Angeles

# ── Sensors: observable quantities ────────────────────────────────────────
# key = snake_case column name used in snapshots and features

sensors:
  temperature:
    thermostat_upstairs_temp:
      entity_id: sensor.upstairs_thermostat_air_temperature
      statistics: true
    thermostat_downstairs_temp:
      entity_id: sensor.downstairs_thermostat_air_temperature
      statistics: true
    upstairs_aggregate_temp:
      entity_id: sensor.upstairs_temperatures
      statistics: true
    downstairs_aggregate_temp:
      entity_id: sensor.downstairs_temperatures
      statistics: true
    family_room_temp:
      entity_id: sensor.climate_family_room_air_temperature
      statistics: true
    office_temp:
      entity_id: sensor.climate_office_air_temperature
      statistics: true
    kitchen_temp:
      entity_id: sensor.kitchen_air_temperature
      statistics: true
    bedroom_temp:
      entity_id: sensor.climate_bedroom_air_temperature
      statistics: true
    bedroom_aggregate_temp:
      entity_id: sensor.bedroom_aggregate_temperature
    piano_temp:
      entity_id: sensor.climate_piano_air_temperature
      statistics: true
    bathroom_temp:
      entity_id: sensor.climate_bathroom_air_temperature
      statistics: true
    living_room_temp:
      entity_id: sensor.living_room_aggregate_temperature
      statistics: true
    living_room_climate_temp:
      entity_id: sensor.climate_living_room_air_temperature
      statistics: true
    basement_temp:
      entity_id: sensor.climate_basement_air_temperature
      statistics: true
    outdoor_temp:
      entity_id: sensor.climate_side_air_temperature
      statistics: true
      role: outdoor
  humidity:
    upstairs_humidity:
      entity_id: sensor.upstairs_thermostat_humidity
      statistics: true
    downstairs_humidity:
      entity_id: sensor.downstairs_thermostat_humidity
    bedroom_humidity:
      entity_id: sensor.climate_bedroom_humidity
    office_humidity:
      entity_id: sensor.climate_office_humidity
    family_room_humidity:
      entity_id: sensor.climate_family_room_humidity
    piano_humidity:
      entity_id: sensor.climate_piano_humidity
    bathroom_humidity:
      entity_id: sensor.climate_bathroom_humidity
    living_room_humidity:
      entity_id: sensor.climate_living_room_humidity
    basement_humidity:
      entity_id: sensor.climate_basement_humidity
    outdoor_humidity:
      entity_id: sensor.climate_side_humidity

# ── Effectors: actuatable devices ─────────────────────────────────────────

effectors:
  thermostats:
    upstairs:
      entity_id: climate.upstairs_thermostat
      zone: upstairs
      state_device: navien  # measured delivery = thermostat calling × boiler firing
    downstairs:
      entity_id: climate.downstairs_thermostat
      zone: downstairs
      state_device: navien
  mini_splits:
    bedroom:
      entity_id: climate.m5nanoc6_bed_split_bedroom_split
      control_type: regulating
      proportional_band: 1.0
      mode_hold_window: [22, 7]
      sweep_modes: [heat, cool]
      command_encoding: { "off": 0, heat: 1, cool: -1, fan_only: 0.5, dry: 0.25, auto: 0.5, heat_cool: 0.5 }
      state_encoding: { heating: 1, cooling: -1, drying: 0.25, idle: 0, "off": 0 }
    living_room:
      entity_id: climate.m5nanoc6_lr_split_living_room_split
      control_type: regulating
      proportional_band: 1.0
      mode_hold_window: [23, 6]
      sweep_modes: [heat, cool]
      command_encoding: { "off": 0, heat: 1, cool: -1, fan_only: 0.5, dry: 0.25, auto: 0.5, heat_cool: 0.5 }
      state_encoding: { heating: 1, cooling: -1, drying: 0.25, idle: 0, "off": 0 }
  blowers:
    family_room:
      entity_id: fan.blower_1
      zone: downstairs
      levels: ["off", low, high]
      level_encoding: { "off": 0, low: 1, high: 2 }
    office:
      entity_id: fan.blower_office
      zone: downstairs
      levels: ["off", low, high]
      level_encoding: { "off": 0, low: 1, high: 2 }
  boiler:
    navien:
      mode_entity: sensor.navien_navien_heating_mode
      capacity_entity: sensor.navien_navien_heat_capacity
      mode_encoding: { "Space Heating": 1, "Idle": 0, "Domestic Hot Water": 0, "DHW Recirculating": 0 }
      health:
        - entity: sensor.navien_navien_sh_return_temp
          min_value: 33
          severity: critical
          message: "Boiler return temp too low — may be in Zone Pump mode"

# ── Windows: environmental modifiers ──────────────────────────────────────
# No 'affects' — sysid learns per-window, per-sensor coupling coefficients
# (window_betas in TauModel). Naming convention provides fallback mapping.

windows:
  basement:
    entity_id: binary_sensor.window_basement_intrusion
  family_room:
    entity_id: binary_sensor.window_family_room_intrusion
  balcony:
    entity_id: binary_sensor.window_balcony_intrusion
  bedroom:
    entity_id: binary_sensor.window_bedroom_intrusion
  office:
    entity_id: binary_sensor.window_office_window_door_is_open
  kitchen:
    entity_id: binary_sensor.kitchen_window_sensor_intrusion
  piano:
    entity_id: binary_sensor.window_piano_is_open
  bathroom:
    entity_id: binary_sensor.bathroom_high_window_open

weather:
  entity_id: weather.forecast_home

# ── Constraints: scoring objectives on sensor values ─────────────────────
# Each constraint references a sensor directly (not a room).
# `preferred` is the ideal temperature — cost rises continuously in both
# directions, weighted by cold_penalty (below) and hot_penalty (above).
# `min`/`max` are hard rails with steep additional penalty (10×).
# Sensor-to-zone mapping is derived from the sysid coupling matrix
# (which thermostat has the highest gain for each sensor).

constraints:
  window_open_offset: { min: -1, max: 1 }
  schedules:
    - sensor: thermostat_upstairs_temp
      schedule:
        - { hours: [0, 24], preferred: 71, min: 70, max: 75, hot_penalty: 0.5 }
    - sensor: thermostat_downstairs_temp
      schedule:
        - { hours: [0, 24], preferred: 72, min: 70, max: 74 }
    - sensor: bedroom_temp
      schedule:
        - { hours: [6, 9], preferred: 71, min: 70, max: 73, cold_penalty: 2.0, hot_penalty: 2.0 }
        - { hours: [9, 21], preferred: 70, min: 69, max: 75, cold_penalty: 1.0, hot_penalty: 0.5 }
        - { hours: [21, 6], preferred: 70, min: 68, max: 72, cold_penalty: 2.0, hot_penalty: 0.75 }
    - sensor: office_temp
      schedule:
        - { hours: [8, 20], preferred: 72, min: 70, max: 74, cold_penalty: 2.0, hot_penalty: 2.0 }
        - { hours: [18, 8], preferred: 70, min: 67, max: 76, cold_penalty: 1.0, hot_penalty: 0.5 }
    - sensor: family_room_temp
      schedule:
        - { hours: [0, 24], preferred: 71, min: 70, max: 74 }
    - sensor: kitchen_temp
      schedule:
        - { hours: [0, 24], preferred: 71, min: 69, max: 75, cold_penalty: 1.0, hot_penalty: 0.5 }
    - sensor: piano_temp
      schedule:
        - { hours: [0, 24], preferred: 71, min: 69, max: 75, cold_penalty: 1.0, hot_penalty: 0.5 }
    - sensor: bathroom_temp
      schedule:
        - { hours: [0, 24], preferred: 71, min: 68, max: 76, cold_penalty: 0.5, hot_penalty: 0.3 }

# ── Zones: topological grouping of effectors ─────────────────────────────
# Which thermostat controls which heating circuit.

zones:
  upstairs:
    thermostat: upstairs
  downstairs:
    thermostat: downstairs

notifications:
  target: notify.mobile_app_richard_s_15_pro

energy_costs:
  gas_zone: 0.010
  mini_split: 0.005
  blower: { "off": 0.0, low: 0.001, high: 0.002 }

advisory:
  effort_cost: 0.5
  quiet_hours: [22, 7]
  cooldowns:
    free_cooling: 14400
    close_windows: 3600

safety:
  cooldowns:
    thermostat_off: 3600
    device_fault: 1800

defaults:
  tau: 45.0  # hours — used before sysid runs
