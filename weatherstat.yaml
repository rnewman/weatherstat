# Weatherstat configuration — single source of truth for all entity IDs,
# column names, device definitions, and operational parameters.
#
# Read by both TypeScript (ha-client) and Python (ml) code.
# Adding a sensor: add an entry here, retrain after data accumulates.
# Removing a sensor: remove entry, old models degrade gracefully (NaN fill).

location:
  latitude: 47.66
  longitude: -122.40
  elevation: 30
  timezone: America/Los_Angeles

sensors:
  temperature:
    # key = snake_case column name in SQLite/Parquet/features
    thermostat_upstairs_temp:
      entity_id: sensor.upstairs_thermostat_air_temperature
      statistics: true
    thermostat_downstairs_temp:
      entity_id: sensor.downstairs_thermostat_air_temperature
      statistics: true
    upstairs_aggregate_temp:
      entity_id: sensor.upstairs_temperatures
      statistics: true
    downstairs_aggregate_temp:
      entity_id: sensor.downstairs_temperatures
      statistics: true
    family_room_temp:
      entity_id: sensor.climate_family_room_air_temperature
      statistics: true
    office_temp:
      entity_id: sensor.climate_office_air_temperature
      statistics: true
    kitchen_temp:
      entity_id: sensor.kitchen_air_temperature
      statistics: true
    bedroom_temp:
      entity_id: sensor.climate_bedroom_air_temperature
      statistics: true
    piano_temp:
      entity_id: sensor.climate_piano_air_temperature
      statistics: true
    bathroom_temp:
      entity_id: sensor.climate_bathroom_air_temperature
      statistics: true
    living_room_temp:
      entity_id: sensor.living_room_aggregate_temperature
      statistics: true
    living_room_climate_temp:
      entity_id: sensor.climate_living_room_air_temperature
      statistics: true
    basement_temp:
      entity_id: sensor.climate_basement_air_temperature
      statistics: true
    outdoor_temp:
      entity_id: sensor.climate_side_air_temperature
      statistics: true
  humidity:
    indoor_humidity:
      entity_id: sensor.upstairs_thermostat_humidity
      statistics: true

devices:
  thermostats:
    upstairs:
      entity_id: climate.upstairs_thermostat
      zone: upstairs
    downstairs:
      entity_id: climate.downstairs_thermostat
      zone: downstairs
  mini_splits:
    bedroom:
      entity_id: climate.m5nanoc6_bed_split_bedroom_split
      sweep_modes: ["off", heat, cool]
      mode_encoding: { "off": 0, heat: 1, cool: -1, fan_only: 0.5, dry: 0.25, auto: 0.5, heat_cool: 0.5 }
    living_room:
      entity_id: climate.m5nanoc6_lr_split_living_room_split
      sweep_modes: ["off", heat, cool]
      mode_encoding: { "off": 0, heat: 1, cool: -1, fan_only: 0.5, dry: 0.25, auto: 0.5, heat_cool: 0.5 }
  blowers:
    family_room:
      entity_id: fan.blower_1
      zone: downstairs
      levels: ["off", low, high]
      level_encoding: { "off": 0, low: 1, high: 2 }
    office:
      entity_id: fan.blower_office
      zone: downstairs
      levels: ["off", low, high]
      level_encoding: { "off": 0, low: 1, high: 2 }
  boiler:
    navien:
      mode_entity: sensor.navien_navien_heating_mode
      capacity_entity: sensor.navien_navien_heat_capacity
      mode_encoding: { "Space Heating": 1, "Idle": 0, "Domestic Hot Water": 0, "DHW Recirculating": 0 }

# Additional temperature sensors only available in the TS collector
# (not in HA long-term statistics, not used for ML features)
extra_temp_sensors:
  bedroom_aggregate:
    entity_id: sensor.bedroom_aggregate_temperature

windows:
  basement:
    entity_id: binary_sensor.window_basement_intrusion
    rooms: []
  family_room:
    entity_id: binary_sensor.window_family_room_intrusion
    rooms: [family_room]
  balcony:
    entity_id: binary_sensor.window_balcony_intrusion
    rooms: []
  bedroom:
    entity_id: binary_sensor.window_bedroom_intrusion
    rooms: [bedroom]
  office:
    entity_id: binary_sensor.window_office_window_door_is_open
    rooms: [office]
  kitchen:
    entity_id: binary_sensor.kitchen_window_sensor_intrusion
    rooms: [kitchen]
  piano:
    entity_id: binary_sensor.window_piano_is_open
    rooms: [piano]
  bathroom:
    entity_id: binary_sensor.bathroom_high_window_open
    rooms: [bathroom]

weather:
  entity_id: weather.forecast_home

rooms:
  upstairs:
    temp_column: thermostat_upstairs_temp
    zone: upstairs
  downstairs:
    temp_column: thermostat_downstairs_temp
    zone: downstairs
  bedroom:
    temp_column: bedroom_temp
    zone: upstairs
  kitchen:
    temp_column: kitchen_temp
    zone: upstairs
  piano:
    temp_column: piano_temp
    zone: upstairs
  bathroom:
    temp_column: bathroom_temp
    zone: upstairs
  family_room:
    temp_column: family_room_temp
    zone: downstairs
  office:
    temp_column: office_temp
    zone: downstairs

comfort:
  window_open_offset: { min: -2, max: 2 }
  upstairs:
    - { hours: [0, 24], min: 70, max: 75, hot_penalty: 0.5 }
  downstairs:
    - { hours: [0, 24], min: 70, max: 74 }
  bedroom:
    - { hours: [6, 9], min: 70, max: 73, cold_penalty: 2.0, hot_penalty: 2.0 }
    - { hours: [9, 21], min: 69, max: 75, cold_penalty: 1.0, hot_penalty: 0.5 }
    - { hours: [21, 6], min: 68, max: 72, cold_penalty: 2.0, hot_penalty: 0.75 }
  office:
    - { hours: [8, 18], min: 70, max: 74, cold_penalty: 2.0, hot_penalty: 2.0 }
    - { hours: [18, 8], min: 67, max: 76, cold_penalty: 1.0, hot_penalty: 0.5 }
  family_room:
    - { hours: [0, 24], min: 70, max: 74 }
  kitchen:
    - { hours: [0, 24], min: 69, max: 75, cold_penalty: 1.0, hot_penalty: 0.5 }
  piano:
    - { hours: [0, 24], min: 69, max: 75, cold_penalty: 1.0, hot_penalty: 0.5 }
  bathroom:
    - { hours: [0, 24], min: 68, max: 76, cold_penalty: 0.5, hot_penalty: 0.3 }

notifications:
  target: notify.mobile_app_richard_s_15_pro

energy_costs:
  gas_zone: 0.010
  mini_split: 0.005
  blower: { "off": 0.0, low: 0.001, high: 0.002 }

thermal:
  # Thermal time constants (hours) — Newton's law of cooling
  # sealed = windows closed, ventilated = windows open
  # Fitted from overnight cooling 2026-02-14; ventilated estimates use
  # bedroom's measured ratio (0.44×) except bedroom itself (measured directly).
  tau_sealed:
    upstairs: 35.7
    downstairs: 44.3
    bedroom: 53.4
    kitchen: 41.2
    piano: 37.3
    bathroom: 43.7
    family_room: 48.1
    office: 47.7
  tau_ventilated:
    upstairs: 15.7
    downstairs: 19.5
    bedroom: 23.5
    kitchen: 18.1
    piano: 16.4
    bathroom: 19.2
    family_room: 21.2
    office: 21.0
  default_tau_sealed: 45.0
  default_tau_ventilated: 20.0

advisory:
  effort_cost: 0.5
  quiet_hours: [22, 7]
  cooldowns:
    free_cooling: 14400
    close_windows: 3600
